<div class="login-container">
  <h2>Connexion</h2>

  <form (ngSubmit)="login()">

    <input
      type="text"
      name="username"
      placeholder="Nom d'utilisateur"
      [(ngModel)]="username"
    >

    <input
      type="password"
      name="password"
      placeholder="Mot de passe"
      [(ngModel)]="password"
    >

    <button type="submit">Se connecter</button>

  </form>

  @if (errorMessage) {
    <p class="error">
      {{ errorMessage }}
    </p>
  }
</div>
