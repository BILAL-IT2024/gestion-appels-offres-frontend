<div style="display:flex;">

  <app-sidebar></app-sidebar>

  <div class="content">

    <h1>Gestion des Appels d'Offres</h1>

    <button (click)="ouvrirFormulaire()">
      + Nouvel Appel d'Offres
    </button>

    @if (showForm) {
      <div style="margin-top:20px; padding:20px; border:1px solid #ccc;">

        <h3>Nouveau Appel d'Offres</h3>

        <input
          type="text"
          placeholder="Référence"
          [(ngModel)]="nouvelAppelOffre.reference"
        >
        <br><br>

        <input
          type="text"
          placeholder="Objet"
          [(ngModel)]="nouvelAppelOffre.objet"
        >
        <br><br>

        <input
          type="date"
          [(ngModel)]="nouvelAppelOffre.datePublication"
        >
        <br><br>

        <input
          type="date"
          [(ngModel)]="nouvelAppelOffre.dateLimite"
        >
        <br><br>

        <input
          type="number"
          placeholder="Montant estimé"
          [(ngModel)]="nouvelAppelOffre.montantEstime"
        >
        <br><br>

        <select [(ngModel)]="nouvelAppelOffre.statut">
          <option value="EN_COURS">EN_COURS</option>
          <option value="ADJUGE">ADJUGE</option>
          <option value="ANNULE">ANNULE</option>
        </select>
        <br><br>

        <select [(ngModel)]="nouvelAppelOffre.client.id">
          <option [ngValue]="0">-- Choisir un client --</option>

          @for (client of clients; track client.id) {
            <option [ngValue]="client.id">
              {{ client.raisonSociale }}
            </option>
          }
        </select>
        <br><br>

        <button (click)="enregistrerAppelOffre()">
          Enregistrer
        </button>

      </div>
    }

    <table class="ao-table">

      <tr>
        <th>Référence</th>
        <th>Objet</th>
        <th>Client</th>
        <th>Montant</th>
        <th>Date Limite</th>
        <th>Statut</th>
        <th>Actions</th>
      </tr>

      @for (ao of appelsOffres; track ao.id) {

        <tr>
          <td>{{ ao.reference }}</td>
          <td>{{ ao.objet }}</td>
          <td>{{ ao.clientNom }}</td>
          <td>{{ ao.montantEstime }}</td>
          <td>{{ ao.dateLimite }}</td>
          <td>{{ ao.statut }}</td>
          <td>
            <button (click)="supprimerAppelOffre(ao.id)">
              Supprimer
            </button>
          </td>
        </tr>

      }

    </table>

  </div>

</div>
